<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Travel Recommendation Website - Discover amazing destinations around the world"
    />
    <title>Travel Recommendation - Home</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;500;700&family=Merriweather:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navigation">
      <nav class="nav-bar">
        <div class="nav-header">
          <span>✈️</span>
          <h1>TravelBloom</h1>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="aboutPage.html">About Us</a></li>
          <li><a href="contactPage.html">Contact</a></li>
        </ul>
      </nav>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Enter a destination or keyword..."
          class="search-input"
        />
        <span
          ><i
            class="fa-solid fa-magnifying-glass"
            style="color: rgb(74, 103, 126)"
          ></i
        ></span>
        <button id="searchBtn" class="search-btn">Search</button>
        <button id="resetBtn" class="reset-btn">Reset</button>
      </div>
    </header>

    <!-- Hero Section -->

    <main>
      <div class="hero-section">
        <div class="hero-content">
          <h1>
            Explore <br />
            Dream <br />
            Destinations
          </h1>
          <p>
            It encourages explorations of unfamiliar <br />
            territories, embracing diverse cultures and <br />
            landscape, while pursing the desired <br />
            destination that captivate the heart and ignite a soul of wonder.
          </p>
          <button>Book Now</button>
        </div>
        <div class="hero-link">
          <a href=""
            ><i class="fa-brands fa-twitter" style="color: rgb(75, 82, 87)"></i
          ></a>
          <a href=""
            ><i
              class="fa-brands fa-facebook-f"
              style="color: rgb(67, 72, 77)"
            ></i
          ></a>
          <a href=""
            ><i
              class="fa-brands fa-instagram"
              style="color: rgb(82, 90, 97)"
            ></i
          ></a>
          <a href=""
            ><i class="fa-brands fa-youtube" style="color: rgb(67, 71, 75)"></i
          ></a>
        </div>
      </div>
    </main>

    <footer></footer>

    <script src="index.js"></script>
  </body>
</html>
